user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include             /etc/nginx/mime.types;
    default_type        application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    types_hash_max_size 4096;

    # File uploads (venue images, etc.)
    client_max_body_size 50M;

    # Gzip for JSON API responses
    gzip on;
    gzip_types application/json text/plain application/javascript text/css;
    gzip_min_length 256;

    # ── Upstream: FastAPI backend on port 8000 ──
    upstream rush_backend {
        server 127.0.0.1:8000;
        keepalive 32;
    }

    # ══════════════════════════════════════════════
    # HTTP → HTTPS global redirect
    # ══════════════════════════════════════════════
    server {
        listen       80;
        listen       [::]:80;
        server_name  api-staging.myrush.in staging.myrush.in admin-staging.myrush.in;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ══════════════════════════════════════════════
    # DOMAIN 1: api-staging.myrush.in (Backend API)
    # ══════════════════════════════════════════════
    server {
        listen       443 ssl;
        listen       [::]:443 ssl;
        server_name  api-staging.myrush.in;

        # SSL Certificates (Manage via Certbot)
        ssl_certificate     /etc/letsencrypt/live/api-staging.myrush.in/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api-staging.myrush.in/privkey.pem;

        # ── Proxy to Backend ──
        location / {
            proxy_pass http://rush_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_read_timeout 120s;
        }

        location = /health {
            proxy_pass http://rush_backend/health;
        }
    }

    # ══════════════════════════════════════════════
    # DOMAIN 2: staging.myrush.in (User Web App)
    # ══════════════════════════════════════════════
    server {
        listen       443 ssl;
        listen       [::]:443 ssl;
        server_name  staging.myrush.in;

        ssl_certificate     /etc/letsencrypt/live/staging.myrush.in/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/staging.myrush.in/privkey.pem;

        # User Frontend Files
        location / {
            root /var/www/myrush_user;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # Backup Proxy for legacy paths
        location /api/ {
            proxy_pass http://rush_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

    # ══════════════════════════════════════════════
    # DOMAIN 3: admin-staging.myrush.in (Admin Panel)
    # ══════════════════════════════════════════════
    server {
        listen       443 ssl;
        listen       [::]:443 ssl;
        server_name  admin-staging.myrush.in;

        ssl_certificate     /etc/letsencrypt/live/admin-staging.myrush.in/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/admin-staging.myrush.in/privkey.pem;

        # Admin Frontend Files
        location / {
            root /var/www/myrush_admin;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # Backup Proxy for legacy paths
        location /api/ {
            proxy_pass http://rush_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
